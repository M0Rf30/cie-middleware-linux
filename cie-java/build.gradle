plugins {
	id 'java'

	id 'application'
	id 'com.diffplug.spotless' version '5.12.5'
}

repositories {
	jcenter()
}

spotless {
	format 'misc', {
		target '*.gradle', '*.md', '.gitignore'

		trimTrailingWhitespace()
		indentWithTabs()
		endWithNewline()
	}
	java {
		googleJavaFormat('1.8').aosp()
	}
}

dependencies {
	implementation fileTree(dir: 'lib', include: ['*.jar'])
	implementation 'com.dorkbox:ObjectPool:2.9'
	implementation 'com.dorkbox:Notify:3.7'
	implementation 'com.dorkbox:ShellExecutor:1.1'
	implementation 'com.dorkbox:SystemTray:3.17'
	implementation 'com.dorkbox:TweenEngine:8.3'
	implementation 'com.google.code.gson:gson:2.8.6'
	implementation 'com.jgoodies:jgoodies-forms:1.9.0'
	implementation 'net.java.dev.jna:jna:4.5.2'
	implementation 'net.java.dev.jna:jna-platform:4.5.2'
	implementation 'org.javassist:javassist:3.27.0-GA'
	implementation 'org.slf4j:slf4j-api:1.7.30'
	implementation 'org.ghost4j:ghost4j:1.0.1'
}

application {
	mainClassName = 'it.ipzs.cieid.MainApplication'
}

sourceSets {
	main {
		java {
			srcDirs = ['src']
		}
	}
}

tasks.withType(JavaCompile) {
	options.compilerArgs += '-Xlint:deprecation'
	options.encoding = 'UTF-8'
}

buildDir = 'bin'

task standalone(type: Jar) {
	dependsOn configurations.runtimeClasspath
	archiveClassifier = 'standalone'
	from sourceSets.main.output
	duplicatesStrategy = DuplicatesStrategy.INCLUDE
	from(configurations.runtimeClasspath.findAll { it.name.endsWith('jar') }.collect { zipTree(it) }) {
		exclude 'META-INF/*.SF'
		exclude 'META-INF/*.DSA'
		exclude 'META-INF/*.RSA'
}
	manifest {
		attributes 'Implementation-Title': 'CIEID Desktop Application',
				'Built-By': System.getProperty('user.name'),
				'Built-Date': new Date(),
				'Built-JDK': System.getProperty('java.version'),
				'Main-Class': mainClassName
	}
}
